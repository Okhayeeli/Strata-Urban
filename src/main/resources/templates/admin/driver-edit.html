<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: head('Edit Driver')}"></head>
<body>

<style>
    .edit-container {
        max-width: 900px;
        margin: 0 auto;
    }

    .back-button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: #f3f4f6;
        border: none;
        border-radius: 8px;
        color: #374151;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 20px;
        transition: all 0.2s;
    }

    .back-button:hover {
        background: #e5e7eb;
        transform: translateX(-4px);
    }

    .edit-card {
        background: white;
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .edit-header {
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 2px solid #f3f4f6;
    }

    .edit-title {
        font-size: 28px;
        font-weight: 700;
        color: #1f2937;
        margin: 0 0 10px 0;
    }

    .edit-subtitle {
        color: #6b7280;
        font-size: 14px;
    }

    .form-section {
        margin-bottom: 35px;
    }

    .section-heading {
        font-size: 18px;
        font-weight: 700;
        color: #1f2937;
        margin: 0 0 20px 0;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .section-icon {
        font-size: 22px;
    }

    .form-row {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-bottom: 20px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .form-group.full-width {
        grid-column: 1 / -1;
    }

    .form-label {
        font-size: 14px;
        font-weight: 600;
        color: #374151;
    }

    .form-label.required::after {
        content: " *";
        color: #ef4444;
    }

    .form-input,
    .form-select,
    .form-textarea {
        padding: 12px 16px;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        transition: all 0.2s;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
        outline: none;
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .form-textarea {
        resize: vertical;
        min-height: 100px;
    }

    .form-input:disabled,
    .form-select:disabled {
        background: #f9fafb;
        cursor: not-allowed;
    }

    .form-actions {
        display: flex;
        gap: 15px;
        justify-content: flex-end;
        padding-top: 30px;
        border-top: 2px solid #f3f4f6;
    }

    .btn {
        padding: 14px 28px;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-primary {
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        color: white;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
    }

    .btn-secondary {
        background: #f3f4f6;
        color: #374151;
        border: 2px solid #e5e7eb;
    }

    .btn-secondary:hover {
        background: #e5e7eb;
    }

    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px;
        background: #f9fafb;
        border-radius: 8px;
        border: 2px solid #e5e7eb;
        cursor: pointer;
        transition: all 0.2s;
    }

    .checkbox-group:hover {
        border-color: #4f46e5;
        background: #f3f4f6;
    }

    .checkbox-group input[type="checkbox"] {
        width: 20px;
        height: 20px;
        cursor: pointer;
    }

    .checkbox-group label {
        cursor: pointer;
        user-select: none;
        flex: 1;
        font-weight: 600;
        color: #374151;
    }

    .help-text {
        font-size: 12px;
        color: #6b7280;
        margin-top: -5px;
    }

    @media (max-width: 768px) {
        .form-row {
            grid-template-columns: 1fr;
        }

        .edit-card {
            padding: 25px;
        }
    }
</style>

<aside th:replace="~{admin/fragments :: sidebar('drivers')}"></aside>

<main class="main-content" id="mainContent">
    <header th:replace="~{admin/fragments :: topHeader('Edit Driver')}"></header>

    <div class="page-content">
        <div class="edit-container">
            <!-- Back Button -->
            <button class="back-button" th:onclick="'window.location.href=\'/admin/drivers/' + ${driver.id} + '\''">
                ← Back to Driver Details
            </button>

            <!-- Edit Form -->
            <div class="edit-card">
                <div class="edit-header">
                    <h1 class="edit-title">Edit Driver Information</h1>
                    <p class="edit-subtitle" th:text="'Editing driver: ' + ${driver.firstName} + ' ' + ${driver.lastName} + ' (ID: #' + ${driver.id} + ')'">Driver info</p>
                </div>

                <form
                        id="editDriverForm"
                        th:action="@{/admin/drivers/{id}/update-form(id=${driver.id})}"
                        method="post">


                <!-- Personal Information -->
                    <div class="form-section">
                        <h2 class="section-heading">
                            <span class="section-icon">👤</span>
                            Personal Information
                        </h2>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Title</label>
                                <input type="text" class="form-input" name="title" th:value="${driver.title}" placeholder="Mr., Mrs., Dr., etc.">
                            </div>
                            <div class="form-group">
                                <label class="form-label required">First Name</label>
                                <input type="text" class="form-input" name="firstName" th:value="${driver.firstName}" required placeholder="First name">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Middle Name</label>
                                <input type="text" class="form-input" name="middleName" th:value="${driver.middleName}" placeholder="Middle name">
                            </div>
                            <div class="form-group">
                                <label class="form-label required">Last Name</label>
                                <input type="text" class="form-input" name="lastName" th:value="${driver.lastName}" required placeholder="Last name">
                            </div>
                        </div>
                    </div>

                    <!-- Contact Information -->
                    <div class="form-section">
                        <h2 class="section-heading">
                            <span class="section-icon">📞</span>
                            Contact Information
                        </h2>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label required">Email</label>
                                <input type="email" class="form-input" name="email" th:value="${driver.email}" required placeholder="email@example.com">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-input" name="username" th:value="${driver.username}" disabled placeholder="Username (cannot be changed)">
                                <p class="help-text">Username cannot be changed after creation</p>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Primary Phone</label>
                                <input type="tel" class="form-input" name="phone" th:value="${driver.phone}" placeholder="+234 XXX XXX XXXX">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Secondary Phone</label>
                                <input type="tel" class="form-input" name="phone2" th:value="${driver.phone2}" placeholder="+234 XXX XXX XXXX">
                            </div>
                        </div>
                    </div>

                    <!-- Location Information -->
                    <div class="form-section">
                        <h2 class="section-heading">
                            <span class="section-icon">📍</span>
                            Location Information
                        </h2>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">City</label>
                                <input type="text" class="form-input" name="city" th:value="${driver.city}" placeholder="City">
                            </div>
                            <div class="form-group">
                                <label class="form-label">State</label>
                                <input type="text" class="form-input" name="state" th:value="${driver.state}" placeholder="State">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Country</label>
                                <input type="text" class="form-input" name="country" th:value="${driver.country}" placeholder="Country">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Preferred Language</label>
                                <input type="text" class="form-input" name="preferredLanguage" th:value="${driver.preferredLanguage}" placeholder="e.g., English, French">
                            </div>
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label">Full Address</label>
                            <textarea class="form-textarea" name="address" th:text="${driver.address}" placeholder="Enter complete address"></textarea>
                        </div>
                    </div>

                    <!-- Provider Information -->
                    <div class="form-section">
                        <h2 class="section-heading">
                            <span class="section-icon">🏢</span>
                            Provider Assignment
                        </h2>
                        
                        <div class="form-row">
                            <div class="form-group full-width">
                                <label class="form-label">Provider</label>
                                <select class="form-select" name="providerId" disabled>
                                    <option value="">No Provider</option>
                                    <option th:each="provider : ${providers}" 
                                            th:value="${provider.id}" 
                                            th:text="${provider.companyName ?: (provider.firstName + ' ' + provider.lastName)}"
                                            th:selected="${driver.providerId != null && driver.providerId.equals(provider.id.toString())}">
                                        Provider
                                    </option>
                                </select>
                                <p class="help-text">Provider assignment cannot be changed from this page</p>
                            </div>
                        </div>
                    </div>

                    <!-- Account Settings -->
                    <div class="form-section">
                        <h2 class="section-heading">
                            <span class="section-icon">⚙️</span>
                            Account Settings
                        </h2>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <div class="checkbox-group">
                                    <input type="checkbox" id="emailVerified" name="emailVerified" th:checked="${driver.emailVerified}">
                                    <label for="emailVerified">Email Verified</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Form Actions -->
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" th:onclick="'window.location.href=\'/admin/drivers/' + ${driver.id} + '\''">
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-primary">
                            💾 Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{admin/fragments :: commonScripts}"></div>

<script>
    // Form validation
    document.getElementById('editDriverForm').addEventListener('submit', function(e) {
        const firstName = document.querySelector('input[name="firstName"]').value.trim();
        const lastName = document.querySelector('input[name="lastName"]').value.trim();
        const email = document.querySelector('input[name="email"]').value.trim();

        if (!firstName || !lastName || !email) {
            e.preventDefault();
            alert('Please fill in all required fields (First Name, Last Name, Email)');
            return false;
        }

        // Email validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            e.preventDefault();
            alert('Please enter a valid email address');
            return false;
        }

        return true;
    });
</script>
</body>
</html>
