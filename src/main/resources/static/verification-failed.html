<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verification Failed</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .logo {
            width: 90px;
            margin-bottom: 20px;
        }

        h2 {
            color: #c62828;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 15px;
            line-height: 1.6;
        }

        .hint {
            margin-top: 15px;
            font-size: 14px;
            color: #777;
        }

        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>
<div class="card">
    <img
            src="https://via.placeholder.com/90?text=🚗"
            alt="App Logo"
            class="logo"
    />

    <h2>Verification Failed ❌</h2>

    <p>
        This verification link is invalid or has already expired.
    </p>

    <p class="hint">
        Please request a new verification email or contact support if the problem persists.
    </p>

    <div class="footer">
        © 2026 Your E-Hailing App
    </div>
</div>
</body>
</html>
